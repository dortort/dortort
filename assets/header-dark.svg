<svg xmlns="http://www.w3.org/2000/svg" width="800" height="210" viewBox="0 0 800 210">
  <defs>
    <style>
      @font-face {
        font-family: 'Montserrat';
        font-weight: 700;
        src: url('data:font/woff2;base64,') format('woff2');
      }
      .name {
        font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
        font-weight: 700;
        font-size: 40px;
        fill: #f0f6fc;
        letter-spacing: 4px;
      }
      .role-primary {
        font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
        font-weight: 600;
        font-size: 13px;
        fill: #C5B358;
        letter-spacing: 3px;
        text-transform: uppercase;
      }
      .role-secondary {
        font-family: 'Montserrat', 'Segoe UI', system-ui, sans-serif;
        font-weight: 600;
        font-size: 12px;
        fill: #8b949e;
        letter-spacing: 2px;
      }
      .prompt {
        font-family: 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace;
        font-size: 11px;
        fill: #6e7681;
      }
    </style>
    <linearGradient id="gold-line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#C5B358" stop-opacity="0"/>
      <stop offset="15%" stop-color="#C5B358" stop-opacity="1"/>
      <stop offset="85%" stop-color="#C5B358" stop-opacity="1"/>
      <stop offset="100%" stop-color="#C5B358" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d1117"/>
      <stop offset="100%" stop-color="#161b22"/>
    </linearGradient>
    <filter id="gold-glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- Background -->
  <rect width="800" height="210" fill="url(#bg-grad)" rx="8"/>
  <!-- Top gold accent -->
  <rect x="0" y="0" width="800" height="3" fill="url(#gold-line)" rx="8"/>
  <!-- Terminal chrome -->
  <circle cx="28" cy="20" r="5" fill="#ff5f57" opacity="0.9"/>
  <circle cx="46" cy="20" r="5" fill="#febc2e" opacity="0.9"/>
  <circle cx="64" cy="20" r="5" fill="#28c840" opacity="0.9"/>
  <text x="88" y="24" class="prompt">~/dortort</text>
  <!-- Name -->
  <text x="400" y="92" text-anchor="middle" class="name">FRANCIS EYTAN DORTORT</text>
  <!-- Gold divider bar -->
  <rect x="200" y="108" width="400" height="2" fill="url(#gold-line)" filter="url(#gold-glow)"/>
  <!-- Roles -->
  <text x="400" y="142" text-anchor="middle" class="role-primary">SENIOR DEVSECOPS ENGINEER</text>
  <text x="400" y="168" text-anchor="middle" class="role-secondary">Cloud Solutions Architect · Infrastructure &amp; Automation</text>
  <!-- Bottom gold accent -->
  <rect x="0" y="207" width="800" height="3" fill="url(#gold-line)" rx="8"/>
</svg>
