<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 180" fill="none">
  <style>
    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }
    .name { font: 700 38px 'Segoe UI', system-ui, -apple-system, sans-serif; fill: #1f2328; }
    .role { font: 400 15px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #656d76; letter-spacing: 0.5px; }
    .cursor { animation: blink 1s step-end infinite; fill: #0969da; }
    .chevron { font: 400 13px 'SFMono-Regular', Consolas, 'Liberation Mono', Menlo, monospace; fill: #0969da; }
  </style>
  <text x="400" y="68" text-anchor="middle" class="name">Francis Eytan Dortort</text>
  <line x1="240" y1="92" x2="560" y2="92" stroke="#d1d9e0" stroke-width="1"/>
  <text x="244" y="89" class="chevron">›_</text>
  <text x="400" y="128" text-anchor="middle" class="role">Senior DevSecOps Engineer  ·  Cloud Solutions Architect</text>
  <rect x="614" y="115" width="2" height="16" rx="1" class="cursor"/>
</svg>
